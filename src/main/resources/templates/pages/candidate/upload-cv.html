<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý CV - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/candidate.css">
</head>
<body>

<!-- Header Placeholder -->
<div th:replace="~{fragments/header.html :: header}"></div>
<div class="candidate-layout">
    <!-- Sidebar Placeholder -->
    <div th:replace="~{fragments/candidate-sidebar.html :: candidate-sidebar}"></div>

    <main class="candidate-content">
        <h3 class="fw-bold mb-4">Quản lý CV</h3>

        <div class="row">
            <div class="col-lg-8">
                <div class="card card-custom p-4 mb-4">
                    <h5 class="fw-bold mb-3">Tải CV lên hệ thống</h5>
                    <p class="text-muted small mb-4">Định dạng hỗ trợ: PDF, DOCX. Dung lượng tối đa: 5MB.</p>

                    <div class="upload-drop-area mb-3">
                        <i class="bi bi-cloud-arrow-up upload-icon"></i>
                        <h5 class="mb-2">Kéo thả file vào đây</h5>
                        <p class="text-muted mb-3">hoặc</p>
                        <button class="btn btn-outline-primary-custom px-4">Chọn file từ máy tính</button>
                    </div>
                </div>

                <div class="card card-custom p-4">
                    <h5 class="fw-bold mb-3">Danh sách CV đã tải lên</h5>
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Tên file</th>
                                <th>Ngày tải lên</th>
                                <th class="text-end">Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <i class="bi bi-file-earmark-pdf text-danger fs-4 me-2"></i>
                                        <span class="fw-500">CV_NguyenVanA_Frontend.pdf</span>
                                    </div>
                                </td>
                                <td class="text-muted">15/11/2026</td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-outline-primary-custom me-1" title="Xem"><i class="bi bi-eye"></i></button>
                                    <button class="btn btn-sm btn-outline-primary-custom me-1" title="Tải xuống"><i class="bi bi-download"></i></button>
                                    <button class="btn btn-sm btn-outline-danger" title="Xóa"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <i class="bi bi-file-earmark-word text-primary fs-4 me-2"></i>
                                        <span class="fw-500">Resume_Nguyen_Van_A_Eng.docx</span>
                                    </div>
                                </td>
                                <td class="text-muted">10/10/2026</td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-outline-primary-custom me-1" title="Xem"><i class="bi bi-eye"></i></button>
                                    <button class="btn btn-sm btn-outline-primary-custom me-1" title="Tải xuống"><i class="bi bi-download"></i></button>
                                    <button class="btn btn-sm btn-outline-danger" title="Xóa"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Footer Placeholder -->
<div th:replace="~{fragments/footer.html :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
