<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Việc làm đã lưu - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../../assets/css/common.css">
    <link rel="stylesheet" href="../../assets/css/candidate.css">
</head>
<body>

<div th:replace="~{fragments/header.html :: header}"></div>

<div class="candidate-layout">
    <div th:replace="~{fragments/candidate-sidebar.html :: candidate-sidebar}"></div>

    <main class="candidate-content">
        <h3 class="fw-bold mb-4">Việc làm đã lưu</h3>

        <!-- Chuyển sang dạng Grid (dạng ô) cho đẹp -->
        <div class="row g-4">
            <!-- Ô Job 1 -->
            <div class="col-lg-4 col-md-6">
                <div class="card card-custom p-3 h-100 d-flex flex-column">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <img src="https://ui-avatars.com/api/?name=Creative+Tech&background=random&color=fff&size=60" alt="Company" class="rounded border p-1" style="width: 60px; height: 60px; object-fit: cover;">
                        <div>
                            <h6 class="fw-bold mb-1 text-primary">UI/UX Designer</h6>
                            <p class="text-muted small mb-0">Creative Tech Studio</p>
                        </div>
                    </div>
                    <div class="d-flex flex-column gap-2 text-muted small mb-4 flex-grow-1">
                        <span><i class="bi bi-cash text-success me-2"></i> Thỏa thuận</span>
                        <span><i class="bi bi-geo-alt me-2"></i> Hà Nội</span>
                    </div>
                    <div class="d-flex gap-2 mt-auto">
                        <a href="job-detail.html" class="btn btn-outline-primary-custom flex-grow-1 text-center text-decoration-none">Xem chi tiết</a>
                        <button class="btn btn-outline-danger px-3"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            </div>

            <!-- Ô Job 2 -->
            <div class="col-lg-4 col-md-6">
                <div class="card card-custom p-3 h-100 d-flex flex-column">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <img src="https://ui-avatars.com/api/?name=TechCorp+VN&background=random&color=fff&size=60" alt="Company" class="rounded border p-1" style="width: 60px; height: 60px; object-fit: cover;">
                        <div>
                            <h6 class="fw-bold mb-1 text-primary">Senior Java Developer</h6>
                            <p class="text-muted small mb-0">TechCorp Vietnam JSC</p>
                        </div>
                    </div>
                    <div class="d-flex flex-column gap-2 text-muted small mb-4 flex-grow-1">
                        <span><i class="bi bi-cash text-success me-2"></i> 2000 - 3000 USD</span>
                        <span><i class="bi bi-geo-alt me-2"></i> Hồ Chí Minh</span>
                    </div>
                    <div class="d-flex gap-2 mt-auto">
                        <a href="job-detail.html" class="btn btn-outline-primary-custom flex-grow-1 text-center text-decoration-none">Xem chi tiết</a>
                        <button class="btn btn-outline-danger px-3"><i class="bi bi-trash"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div th:replace="~{fragments/footer.html :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
