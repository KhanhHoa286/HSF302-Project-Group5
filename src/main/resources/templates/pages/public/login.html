<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../../../static/assets/css/common.css">
    <link rel="stylesheet" href="../../../static/assets/css/public.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<section class="auth-wrapper">
    <div class="card card-custom auth-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">Đăng nhập</h3>
            <p class="text-muted">Chào mừng bạn quay lại với JobPortal</p>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="Nhập địa chỉ email" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe">
                        Ghi nhớ đăng nhập
                    </label>
                </div>
                <a href="#" class="text-decoration-none fw-bold" style="font-weight: 500;">Quên mật khẩu?</a>
            </div>

            <!-- Nút đăng nhập mặc định (Giả định luồng Ứng viên) -->
            <input type="submit" value="Đăng nhập">
            <div class="text-center mt-4 border-top pt-3">
                <span class="text-muted">Chưa có tài khoản? </span>
                <a href="register.html" class="text-decoration-none fw-bold">Đăng ký tài khoản</a>
            </div>
        </form>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
