<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/assets/css/common.css}">
    <link rel="stylesheet" th:href="@{/assets/css/public.css}">
</head>
<body>

<!-- Header Placeholder -->
<div th:replace="~{fragments/header :: header(activePage='register')}"></div>

<section class="auth-wrapper" style="background-color: #f4f6f8;">
    <div class="candidate-register-container">
        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1" style="color: #212f3f;">Đăng ký <span class="text-green-topcv">JobPortal</span></h3>
            <p class="text-muted small">Tạo tài khoản miễn phí, tìm kiếm hơn 60.000 việc làm.</p>
        </div>

        <div th:if="${errors}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errors}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <form th:action="@{/register}" method="post" th:object="${userRequestDTO}">
            <!-- CSRF Token or hidden fields can be added here by backend -->
            <div class="mb-3">
                <label class="topcv-label">Họ và tên</label>
                <div class="topcv-input-group">
                    <i class="bi bi-person prefix-icon text-green-topcv"></i>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nhập họ và tên" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
            </div>

            <div class="mb-3">
                <label class="topcv-label">Email</label>
                <div class="topcv-input-group">
                    <i class="bi bi-envelope prefix-icon text-green-topcv"></i>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Nhập email" required>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-3">
                <label class="topcv-label">Mật khẩu</label>
                <div class="topcv-input-group">
                    <i class="bi bi-lock prefix-icon text-green-topcv"></i>
                    <input type="password" th:field="*{password}" id="passwordField" class="form-control" placeholder="Nhập mật khẩu" required>
                    <i class="bi bi-eye-slash toggle-password" onclick="togglePasswordVisibility('passwordField', this)"></i>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <div class="mb-3">
                <label class="topcv-label">Xác nhận mật khẩu</label>
                <div class="topcv-input-group">
                    <i class="bi bi-lock prefix-icon text-green-topcv"></i>
                    <input type="password" th:field="*{confirmPassword}" id="confirmPasswordField" class="form-control" placeholder="Nhập lại mật khẩu" required>
                    <i class="bi bi-eye-slash toggle-password" onclick="togglePasswordVisibility('confirmPasswordField', this)"></i>
                </div>
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>

            <div class="mb-4">
                <div class="form-check d-flex align-items-start gap-2">
                    <input class="form-check-input" name="acceptTerms" type="checkbox" id="termsCheck" required style="margin-top: 4px; accent-color: #00b14f;">
                    <label class="topcv-checkbox-label" for="termsCheck">
                        Tôi đã đọc và đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a th:href="@{/privacy-policy}" target="_blank">Chính sách bảo mật</a> của JobPortal (Bắt buộc)
                    </label>
                </div>
                <div class="text-danger small mt-1" th:if="${acceptTermsError}" th:text="${acceptTermsError}"></div>
            </div>

            <button type="submit" class="btn btn-topcv-green-submit mb-3">
                Đăng ký <i class="bi bi-arrow-right"></i>

            </button>

            <div class="topcv-divider">Hoặc</div>

            <a href="#" class="btn btn-topcv-outline-submit mb-4">
                Đăng ký bằng tài khoản mạng xã hội <i class="bi bi-arrow-right"></i>
            </a>

            <div class="text-center">
                <span class="text-muted small">Bạn đã có tài khoản? </span>
                <a href="login.html" th:href="@{/login}" class="text-decoration-none fw-bold text-green-topcv small">Đăng nhập ngay</a>
            </div>

            <div class="topcv-help-footer">
                Bạn gặp khó khăn khi tạo tài khoản? Vui lòng gọi tới số <strong class="text-green-topcv">1900 068 889</strong> | Nhánh 2 (giờ hành chính).
            </div>
        </form>
    </div>
</section>

<script>
    function togglePasswordVisibility(fieldId, iconElement) {
        const passwordInput = document.getElementById(fieldId);
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            iconElement.classList.remove('bi-eye-slash');
            iconElement.classList.add('bi-eye');
        } else {
            passwordInput.type = 'password';
            iconElement.classList.remove('bi-eye');
            iconElement.classList.add('bi-eye-slash');
        }
    }
</script>

<!-- Footer Placeholder -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
