<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - JobPortal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="../../../static/assets/css/common.css">
    <link rel="stylesheet" href="../../../static/assets/css/public.css">
</head>
<body>

<!-- Header Placeholder -->
<div th:replace="~{fragments/header :: header}"></div>

<section class="auth-wrapper">
    <div class="card card-custom auth-card register-card">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">Đăng ký tài khoản</h3>
            <p class="text-muted">Tham gia ngay mạng lưới việc làm lớn nhất</p>
        </div>

        <form>
            <div class="mb-4 d-flex gap-4 justify-content-center">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="roleOptions" id="roleCandidate" value="candidate" checked>
                    <label class="form-check-label fw-bold" for="roleCandidate">Ứng viên</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="roleOptions" id="roleEmployer" value="employer">
                    <label class="form-check-label fw-bold" for="roleEmployer">Nhà tuyển dụng</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Họ và tên</label>
                <input type="text" class="form-control" placeholder="Nhập họ và tên" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" class="form-control" placeholder="Nhập địa chỉ email" required>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-bold">Mật khẩu</label>
                    <input type="password" class="form-control" placeholder="Mật khẩu" required>
                </div>
                <div class="col-md-6 mb-4">
                    <label class="form-label fw-bold">Xác nhận mật khẩu</label>
                    <input type="password" class="form-control" placeholder="Nhập lại mật khẩu" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 mb-3">Đăng ký</button>

            <div class="text-center mt-3">
                <span class="text-muted">Đã có tài khoản? </span>
                <a href="login.html" class="text-decoration-none fw-bold">Đăng nhập</a>
            </div>
        </form>
    </div>
</section>

<!-- Footer Placeholder -->
<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
